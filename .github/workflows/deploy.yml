name: Deploy Job Automation Bot to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Deployment Package
        run: zip -r deploy.zip . -x "*.git*" -x "*__pycache__*" -x "venv/*"

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Copy Package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy.zip"
          target: "/tmp"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Deploying Job Automation Bot..."

            DEST_DIR="/home/${{ secrets.EC2_USERNAME }}/job-automation-bot"
            mkdir -p $DEST_DIR

            # Install core dependencies
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip python3-venv unzip curl xvfb
            
            # Install Chrome & ChromeDriver
            if ! command -v google-chrome &> /dev/null; then
                wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
                sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
                sudo apt-get update
                sudo apt-get install -y google-chrome-stable
            fi

            # Extract project code
            unzip -o /tmp/deploy.zip -d $DEST_DIR
            rm -f /tmp/deploy.zip

            cd $DEST_DIR

            # Set up virtual environment
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Create systemd service for FastAPI
            sudo tee /etc/systemd/system/job-bot.service > /dev/null <<EOF
            [Unit]
            Description=Job Automation Bot Manager (FastAPI)
            After=network.target

            [Service]
            User=${{ secrets.EC2_USERNAME }}
            WorkingDirectory=$DEST_DIR
            ExecStart=$DEST_DIR/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000
            Restart=always

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable job-bot
            sudo systemctl restart job-bot

            # Setup initial cron job (runs every day at 00:00)
            # Use python to set it up reliably via python-crontab logic or simple crontab command
            (crontab -l 2>/dev/null | grep -v "job-automation-bot"; echo "0 0 * * * cd $DEST_DIR && $DEST_DIR/venv/bin/python $DEST_DIR/resume_update.py # job-automation-bot") | crontab -

            echo "✅ Deployment complete! API running on port 8000"
