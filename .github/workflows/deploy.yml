name: Deploy Job Automation Bot to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # For Python, we don't have a build step like Node.js
      # We just zip the project directory directly
      - name: Create Deployment Package
        run: zip -r deploy.zip . -x "*.git*" -x "*__pycache__*" -x "venv/*"

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Copy Package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy.zip"
          target: "/tmp"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Deploying Job Automation Bot..."

            # Setup destination directory
            DEST_DIR="/home/${{ secrets.EC2_USERNAME }}/job-automation-bot"
            mkdir -p $DEST_DIR

            # Install core dependencies (Python, pip, unzip, and Chrome for Selenium)
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip python3-venv unzip curl xvfb
            sudo apt-get install -y chromium-browser chromium-chromedriver || echo "Could not install chromium, trying google-chrome..."

            # Extract project code
            unzip -o /tmp/deploy.zip -d $DEST_DIR
            rm -f /tmp/deploy.zip

            # Move to project directory
            cd $DEST_DIR

            # Set up Python virtual environment
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi

            # Activate virtual environment and install dependencies
            source venv/bin/activate
            # Upgrade pip
            pip install --upgrade pip
            
            if [ -f "requirements.txt" ]; then
                pip install -r requirements.txt
            else
                pip install selenium python-dotenv
            fi

            # Optionally, you can set up a cronjob or systemd service here 
            # to run the bot periodically on the EC2 server

            echo "✅ Deployment complete!"
