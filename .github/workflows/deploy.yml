name: Deploy Job Automation Bot to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Deployment Package
        run: zip -r deploy.zip . -x "*.git*" -x "*__pycache__*" -x "venv/*"

      - name: Upload Deployment Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Deployment Artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Copy Package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy.zip"
          target: "/tmp"

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "📦 Deploying Job Automation Bot..."

            # Constants
            DOMAIN="jobot.vinayjana.dev"
            DEST_DIR="/home/${{ secrets.EC2_USERNAME }}/job-automation-bot"
            mkdir -p $DEST_DIR

            # Install core dependencies
            sudo apt-get update -y
            sudo apt-get install -y python3 python3-pip python3-venv unzip curl xvfb nginx certbot python3-certbot-nginx

            # Install Chrome & ChromeDriver
            if ! command -v google-chrome &> /dev/null; then
                wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
                sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
                sudo apt-get update
                sudo apt-get install -y google-chrome-stable
            fi

            # Extract project code
            unzip -o /tmp/deploy.zip -d $DEST_DIR
            rm -f /tmp/deploy.zip

            cd $DEST_DIR

            # Set up virtual environment
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # Create systemd service for FastAPI (bind to localhost)
            sudo tee /etc/systemd/system/job-bot.service > /dev/null <<EOF
            [Unit]
            Description=Job Automation Bot Manager (FastAPI)
            After=network.target

            [Service]
            User=${{ secrets.EC2_USERNAME }}
            WorkingDirectory=$DEST_DIR
            ExecStart=$DEST_DIR/venv/bin/uvicorn main:app --host 127.0.0.1 --port 8000
            Restart=always
            EnvironmentFile=$DEST_DIR/.env

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable job-bot
            sudo systemctl restart job-bot

            # Setup initial cron job (runs every day at 00:00)
            (crontab -l 2>/dev/null | grep -v "job-automation-bot"; echo "0 0 * * * cd $DEST_DIR && $DEST_DIR/venv/bin/python $DEST_DIR/resume_update.py # job-automation-bot") | crontab -

            # --- 1. SET UP NGINX BASELINE ---
            echo "Creating Nginx configuration for $DOMAIN..."
            sudo tee /etc/nginx/sites-available/$DOMAIN > /dev/null <<EOF
            server {
                listen 80;
                server_name $DOMAIN;

                location / {
                    proxy_pass http://127.0.0.1:8000;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    client_max_body_size 10M;
                }
            }
            EOF

            sudo ln -sf /etc/nginx/sites-available/$DOMAIN /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default

            # Verify and reload nginx to ensure HTTP works first
            sudo nginx -t && sudo systemctl reload nginx

            # --- 2. AUTO-GENERATE SSL CERTIFICATE ---
            echo "Requesting SSL certificate..."
            # This command will automatically update the Nginx file we just created with SSL settings
            sudo certbot --nginx \
                -d $DOMAIN \
                --non-interactive \
                --agree-tos \
                --email ${{ secrets.EC2_EMAIL }} \
                --redirect \
                --expand || echo "Certbot failed (Check DNS propagation). Continuing with HTTP..."

            # Final reload to apply everything
            sudo systemctl reload nginx

            sudo systemctl enable certbot.timer
            sudo systemctl start certbot.timer

            echo "✅ Deployment complete! Try accessing https://$DOMAIN"
