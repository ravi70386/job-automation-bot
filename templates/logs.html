{% extends "base.html" %}

{% block title %}Execution Logs - JobBot{% endblock %}

{% block content %}
    <div class="card">
        <h2>Execution logs</h2>
        <div style="display: flex; flex-direction: column; gap: 1rem;">
            {% for log in logs %}
                <div style="background: rgba(15, 23, 42, 0.3); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span style="font-weight: 600;">{{ log }}</span>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <a href="/logs/{{ log }}" target="_blank" class="btn btn-outline" style="padding: 0.5rem 1rem; font-size: 0.875rem;">View Raw</a>
                    </div>
                </div>
            {% endfor %}
            {% if not logs %}
                <p style="padding: 3rem; text-align: center; color: var(--text-muted);">No logs available yet.</p>
            {% endif %}
        </div>
    </div>
{% endblock %}
